<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="felt" cx="50%" cy="45%" r="78%">
      <stop offset="0%" stop-color="#6d2232"/>
      <stop offset="48%" stop-color="#44121d"/>
      <stop offset="100%" stop-color="#180408"/>
    </radialGradient>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#b9873f" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#b9873f" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#b9873f" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d986"/>
      <stop offset="28%" stop-color="#c79644"/>
      <stop offset="50%" stop-color="#f1d17a"/>
      <stop offset="72%" stop-color="#a66b27"/>
      <stop offset="100%" stop-color="#edcb70"/>
    </linearGradient>

    <pattern id="grain" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.6" fill="#fff" opacity="0.025"/>
      <circle cx="5" cy="2" r="0.5" fill="#fff" opacity="0.02"/>
      <circle cx="3" cy="5" r="0.45" fill="#fff" opacity="0.018"/>
    </pattern>

    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#felt)"/>
  <rect width="1920" height="1080" fill="url(#grain)"/>
  <ellipse cx="960" cy="540" rx="520" ry="230" fill="url(#centerGlow)" filter="url(#softBlur)"/>

  <rect x="44" y="44" width="1832" height="992" rx="28" fill="none" stroke="url(#gold)" stroke-opacity="0.35" stroke-width="2.5"/>
  <rect x="62" y="62" width="1796" height="956" rx="24" fill="none" stroke="url(#gold)" stroke-opacity="0.18" stroke-width="1.2"/>

  <g opacity="0.65">
    <path d="M84 78 h56" stroke="url(#gold)" stroke-width="2" fill="none"/>
    <path d="M78 84 v56" stroke="url(#gold)" stroke-width="2" fill="none"/>
    <path d="M1836 78 h-56" stroke="url(#gold)" stroke-width="2" fill="none"/>
    <path d="M1842 84 v56" stroke="url(#gold)" stroke-width="2" fill="none"/>
    <path d="M84 1002 h56" stroke="url(#gold)" stroke-width="2" fill="none"/>
    <path d="M78 996 v-56" stroke="url(#gold)" stroke-width="2" fill="none"/>
    <path d="M1836 1002 h-56" stroke="url(#gold)" stroke-width="2" fill="none"/>
    <path d="M1842 996 v-56" stroke="url(#gold)" stroke-width="2" fill="none"/>
  </g>

  <g filter="url(#shadow)">
    <ellipse cx="960" cy="540" rx="360" ry="150" fill="#22070d" fill-opacity="0.24" stroke="url(#gold)" stroke-opacity="0.16" stroke-width="2"/>
  </g>

  <g opacity="0.88">
    <line x1="690" y1="495" x2="870" y2="495" stroke="url(#gold)" stroke-opacity="0.55" stroke-width="2"/>
    <line x1="1050" y1="495" x2="1230" y2="495" stroke="url(#gold)" stroke-opacity="0.55" stroke-width="2"/>
    <polygon points="960,487 968,495 960,503 952,495" fill="url(#gold)"/>

    <text x="960" y="475" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" letter-spacing="12" fill="url(#gold)">ONLINE</text>
    <text x="960" y="585" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="138" letter-spacing="10" fill="url(#gold)">BURA</text>
    <text x="960" y="648" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-style="italic" fill="url(#gold)" fill-opacity="0.82">classic play</text>

    <line x1="690" y1="700" x2="870" y2="700" stroke="url(#gold)" stroke-opacity="0.42" stroke-width="2"/>
    <line x1="1050" y1="700" x2="1230" y2="700" stroke="url(#gold)" stroke-opacity="0.42" stroke-width="2"/>
    <polygon points="960,692 968,700 960,708 952,700" fill="url(#gold)"/>
  </g>
</svg>
