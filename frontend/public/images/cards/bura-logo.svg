    <line x1="92" y1="213" x2="197" y2="213" stroke="#7C5520" stroke-width="0.5"/>
    <line x1="246" y1="213" x2="351" y2="213" stroke="#7C5520" stroke-width="0.5"/>
    <line x1="94" y1="213.6" x2="199" y2="213.6" stroke="#2A1507" stroke-width="0.25" opacity="0.7"/>
    <line x1="248" y1="213.6" x2="353" y2="213.6" stroke="#2A1507" stroke-width="0.25" opacity="0.7"/>

