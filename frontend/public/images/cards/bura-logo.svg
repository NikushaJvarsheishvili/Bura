<svg xmlns="http://www.w3.org/2000/svg" width="443" height="625" viewBox="0 0 443 625" fill="none">
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(221.5 312.5) rotate(90) scale(360 280)">
      <stop offset="0" stop-color="#3C1D2E"/>
      <stop offset="0.58" stop-color="#2A0714"/>
      <stop offset="1" stop-color="#120007"/>
    </radialGradient>
    <linearGradient id="gold" x1="66" y1="312" x2="377" y2="312" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D6B15A"/>
      <stop offset="0.22" stop-color="#F0D37B"/>
      <stop offset="0.45" stop-color="#B9852D"/>
